name: rinha-fraud

x-api: &api
  image: rinha-fraud:local
  build:
    context: .
    dockerfile: Dockerfile
  entrypoint: ["/rinha-server"]
  volumes:
    - sockets:/sockets
  networks:
    - app
  ulimits:
    memlock: -1   # permite mlock do indice (sem page-fault na cauda)
  deploy:
    resources:
      limits:
        cpus: "0.47"
        memory: "170MB"

services:
  # Config otimizada para o Mac Mini do teste (cpuset + busy-poll).
  # Para testar no WSL2/Docker Desktop, rode com BUSY_POLL=0 (pinning/busy-poll
  # causam contencao no WSL2, mas ajudam no Mac Mini nativo).
  api1:
    <<: *api
    cpuset: "0"
    environment:
      WORKERS: "${WORKERS:-1}"
      RINHA_C_BUSY_POLL_US: "${BUSY_POLL:-50}"
      RINHA_SOCKET: /sockets/api1.sock

  api2:
    <<: *api
    cpuset: "1"
    depends_on:
      - api1
    environment:
      WORKERS: "${WORKERS:-1}"
      RINHA_C_BUSY_POLL_US: "${BUSY_POLL:-50}"
      RINHA_SOCKET: /sockets/api2.sock

  lb:
    image: rinha-fraud:local
    entrypoint: ["/rinha-lb"]
    cpuset: "2,3"
    depends_on:
      - api1
      - api2
    environment:
      PORT: "9999"
      RINHA_BACKENDS: "/sockets/api1.sock.0,/sockets/api2.sock.0"
    volumes:
      - sockets:/sockets
    ports:
      - "9999:9999"
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.06"
          memory: "10MB"

volumes:
  sockets:

networks:
  app:
    driver: bridge
